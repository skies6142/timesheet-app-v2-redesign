<svg viewBox="0 0 620 210" xmlns="http://www.w3.org/2000/svg" width="620" height="210">

  <!-- Background -->
  <rect width="620" height="210" fill="#09090B" rx="20"/>

  <!-- Ambient glow -->
  <ellipse cx="102" cy="110" rx="58" ry="48" fill="#FBBF24" opacity="0.06"/>

  <!-- === STACK OF SHEETS === -->

  <!-- Back sheet (furthest back, zinc, rotated right) -->
  <g transform="rotate(9, 110, 105)">
    <rect x="75" y="42" width="72" height="96" rx="10" fill="#3F3F46"/>
    <rect x="75" y="42" width="72" height="14" rx="10" fill="#52525B" opacity="0.5"/>
  </g>

  <!-- Middle sheet (rotated slightly) -->
  <g transform="rotate(4, 103, 105)">
    <rect x="68" y="37" width="72" height="96" rx="10" fill="#FBBF24" opacity="0.38"/>
  </g>

  <!-- Front sheet (amber, straight) -->
  <rect x="58" y="32" width="74" height="98" rx="10" fill="#FBBF24"/>

  <!-- Highlight strip at top of front sheet -->
  <rect x="58" y="32" width="74" height="16" rx="10" fill="white" opacity="0.07"/>

  <!-- Content lines on front sheet -->
  <rect x="69" y="52" width="42" height="7" rx="3.5" fill="#78350F" opacity="0.55"/>
  <rect x="69" y="66" width="34" height="5" rx="2.5" fill="#78350F" opacity="0.32"/>
  <rect x="69" y="77" width="38" height="5" rx="2.5" fill="#78350F" opacity="0.32"/>
  <rect x="69" y="88" width="24" height="5" rx="2.5" fill="#78350F" opacity="0.32"/>

  <!-- Divider on front sheet -->
  <line x1="63" y1="106" x2="128" y2="106" stroke="#78350F" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Checkmark on front sheet -->
  <polyline points="70,118 82,128 108,106"
    stroke="#78350F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.65"/>

  <!-- Wordmark -->
  <text x="168" y="118"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="66" font-weight="800" fill="#FAFAFA" letter-spacing="-3">docket</text>

  <!-- Tagline -->
  <text x="170" y="146"
    font-family="-apple-system, BlinkMacSystemFont, sans-serif"
    font-size="11" font-weight="500" fill="#52525B" letter-spacing="6">FIELD MANAGEMENT</text>

  <!-- Concept label -->
  <text x="310" y="192"
    font-family="-apple-system, sans-serif"
    font-size="10" font-weight="400" fill="#3F3F46" letter-spacing="2" text-anchor="middle">CONCEPT 04 · THE STACK</text>
</svg>
