<svg viewBox="0 0 620 210" xmlns="http://www.w3.org/2000/svg" width="620" height="210">
  <defs>
    <filter id="glow1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="620" height="210" fill="#09090B" rx="20"/>

  <!-- Ambient glow behind icon -->
  <ellipse cx="100" cy="105" rx="52" ry="52" fill="#FBBF24" opacity="0.07"/>

  <!-- Drop shadow -->
  <path d="M73,42 Q73,32 83,32 L127,32 Q137,32 137,42
    L137,158 L130,151 L123,158 L116,151 L109,158 L102,151 L95,158 L88,151 L81,158 L74,151 L73,158 Z"
    fill="#FBBF24" opacity="0.12" transform="translate(4,5)"/>

  <!-- Receipt / docket body -->
  <path d="M73,42 Q73,32 83,32 L127,32 Q137,32 137,42
    L137,158 L130,151 L123,158 L116,151 L109,158 L102,151 L95,158 L88,151 L81,158 L74,151 L73,158 Z"
    fill="#FBBF24"/>

  <!-- Subtle inner highlight at top -->
  <path d="M73,42 Q73,32 83,32 L127,32 Q137,32 137,42 L137,52 L73,52 Z"
    fill="white" opacity="0.08"/>

  <!-- Text lines on docket -->
  <rect x="83" y="50" width="42" height="7" rx="3.5" fill="#78350F" opacity="0.55"/>
  <rect x="83" y="64" width="34" height="5" rx="2.5" fill="#78350F" opacity="0.32"/>
  <rect x="83" y="75" width="40" height="5" rx="2.5" fill="#78350F" opacity="0.32"/>
  <rect x="83" y="86" width="26" height="5" rx="2.5" fill="#78350F" opacity="0.32"/>

  <!-- Perforated divider -->
  <line x1="77" y1="108" x2="133" y2="108" stroke="#78350F" stroke-width="1.5" stroke-dasharray="4,3.5" opacity="0.45"/>

  <!-- Checkmark in bottom section -->
  <polyline points="83,130 96,142 124,116"
    stroke="#78350F" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="168" y="122"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="66" font-weight="800" fill="#FAFAFA" letter-spacing="-3">docket</text>

  <!-- Tagline -->
  <text x="170" y="150"
    font-family="-apple-system, BlinkMacSystemFont, sans-serif"
    font-size="11" font-weight="500" fill="#52525B" letter-spacing="6">FIELD MANAGEMENT</text>

  <!-- Concept label -->
  <text x="310" y="192"
    font-family="-apple-system, sans-serif"
    font-size="10" font-weight="400" fill="#3F3F46" letter-spacing="2" text-anchor="middle">CONCEPT 01 · THE SLIP</text>
</svg>
