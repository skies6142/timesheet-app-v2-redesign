<svg viewBox="0 0 620 210" xmlns="http://www.w3.org/2000/svg" width="620" height="210">

  <!-- Background -->
  <rect width="620" height="210" fill="#09090B" rx="20"/>

  <!-- Ambient glow behind stack -->
  <ellipse cx="105" cy="108" rx="62" ry="52" fill="#FBBF24" opacity="0.07"/>

  <!-- === STACK OF SHEETS === -->

  <!-- Back sheet — zinc, rotated right -->
  <g transform="rotate(10, 108, 105)">
    <rect x="70" y="38" width="76" height="100" rx="11" fill="#27272A"/>
    <rect x="70" y="38" width="76" height="18" rx="11" fill="#3F3F46"/>
  </g>

  <!-- Middle sheet — amber tinted, rotated slightly -->
  <g transform="rotate(4.5, 105, 105)">
    <rect x="64" y="34" width="76" height="100" rx="11" fill="#FBBF24" opacity="0.35"/>
  </g>

  <!-- Front sheet — full amber -->
  <rect x="56" y="30" width="78" height="102" rx="11" fill="#FBBF24"/>

  <!-- Subtle top highlight on front sheet -->
  <rect x="56" y="30" width="78" height="18" rx="11" fill="white" opacity="0.08"/>

  <!-- Content lines -->
  <rect x="68" y="50" width="44" height="7.5" rx="3.5" fill="#78350F" opacity="0.55"/>
  <rect x="68" y="65" width="36" height="5" rx="2.5" fill="#78350F" opacity="0.3"/>
  <rect x="68" y="76" width="42" height="5" rx="2.5" fill="#78350F" opacity="0.3"/>
  <rect x="68" y="87" width="28" height="5" rx="2.5" fill="#78350F" opacity="0.3"/>

  <!-- Perforated line -->
  <line x1="61" y1="105" x2="130" y2="105" stroke="#78350F" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.38"/>

  <!-- Checkmark (bold, clean) -->
  <polyline points="68,118 82,130 112,106"
    stroke="#78350F" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.65"/>

  <!-- Wordmark -->
  <text x="170" y="120"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="66" font-weight="800" fill="#FAFAFA" letter-spacing="-3">docket</text>

  <!-- Tagline -->
  <text x="172" y="148"
    font-family="-apple-system, BlinkMacSystemFont, sans-serif"
    font-size="11" font-weight="500" fill="#52525B" letter-spacing="6">FIELD MANAGEMENT</text>

  <!-- Concept label -->
  <text x="310" y="192"
    font-family="-apple-system, sans-serif"
    font-size="10" font-weight="400" fill="#3F3F46" letter-spacing="2" text-anchor="middle">CONCEPT 04 · THE STACK · REFINED</text>
</svg>
