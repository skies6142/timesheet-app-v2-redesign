<svg viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg" width="720" height="440">

  <!-- Sheet background -->
  <rect width="720" height="440" fill="#09090B" rx="20"/>

  <!-- Header -->
  <text x="360" y="32"
    font-family="-apple-system, BlinkMacSystemFont, sans-serif"
    font-size="11" font-weight="500" fill="#3F3F46" letter-spacing="3" text-anchor="middle">
    APP ICON PREVIEW · SAME MARK AT EVERY SIZE
  </text>

  <!--
    ═══════════════════════════════════════════════════════════════
    Each icon is a nested <svg> with viewBox="0 0 200 200".
    The content is identical — only x/y/width/height differ.
    A local <clipPath> inside each nested SVG handles the
    rounded corners proportionally at every size.
    ═══════════════════════════════════════════════════════════════
  -->

  <!-- ─── XL · App Store · 200×200 ───────────────────────────── -->
  <svg x="60" y="50" width="200" height="200" viewBox="0 0 200 200">
    <defs>
      <clipPath id="cx">
        <rect width="200" height="200" rx="46"/>
      </clipPath>
    </defs>
    <g clip-path="url(#cx)">
      <rect width="200" height="200" fill="#18181B"/>
      <ellipse cx="83" cy="104" rx="68" ry="58" fill="#FBBF24" opacity="0.07"/>
      <g transform="rotate(10, 100, 105)">
        <rect x="44" y="22" width="110" height="144" rx="15" fill="#27272A"/>
        <rect x="44" y="22" width="110" height="22"  rx="15" fill="#3F3F46"/>
      </g>
      <g transform="rotate(4.5, 100, 105)">
        <rect x="36" y="14" width="110" height="144" rx="15" fill="#FBBF24" opacity="0.32"/>
      </g>
      <rect x="26" y="6"  width="112" height="146" rx="15" fill="#FBBF24"/>
      <rect x="26" y="6"  width="112" height="24"  rx="15" fill="white" opacity="0.08"/>
      <rect x="39" y="34" width="66"  height="11"  rx="5"  fill="#78350F" opacity="0.55"/>
      <rect x="39" y="53" width="52"  height="7"   rx="3"  fill="#78350F" opacity="0.28"/>
      <rect x="39" y="66" width="62"  height="7"   rx="3"  fill="#78350F" opacity="0.28"/>
      <rect x="39" y="79" width="44"  height="7"   rx="3"  fill="#78350F" opacity="0.28"/>
      <line x1="30" y1="100" x2="132" y2="100" stroke="#78350F" stroke-width="2.5" stroke-dasharray="6,4" opacity="0.40"/>
      <polyline points="37,121 59,142 112,104" stroke="#78350F" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.65"/>
    </g>
  </svg>
  <text x="160" y="272" font-family="-apple-system, sans-serif" font-size="10" fill="#52525B" letter-spacing="1" text-anchor="middle">App Store · 1024×1024</text>

