<svg viewBox="0 0 620 210" xmlns="http://www.w3.org/2000/svg" width="620" height="210">
  <defs>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="620" height="210" fill="#09090B" rx="20"/>

  <!-- Soft glow under mark -->
  <ellipse cx="100" cy="118" rx="60" ry="28" fill="#FBBF24" opacity="0.09"/>

  <!-- Outer ring (subtle) -->
  <circle cx="100" cy="105" r="62" fill="none" stroke="#FBBF24" stroke-width="1" opacity="0.08"/>

  <!-- Bold fluid checkmark — outer glow layer -->
  <path d="M 48,112 Q 66,126 80,136 Q 100,112 152,58"
    stroke="#FBBF24" stroke-width="28" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.12"/>

  <!-- Bold fluid checkmark — main stroke -->
  <path d="M 48,112 Q 66,126 80,136 Q 100,112 152,58"
    stroke="#FBBF24" stroke-width="18" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Inner highlight on stroke -->
  <path d="M 48,112 Q 66,126 80,136 Q 100,112 152,58"
    stroke="white" stroke-width="4" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.08"/>

  <!-- Small dot at start of check (anchor point) -->
  <circle cx="48" cy="112" r="5" fill="#FBBF24" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="185" y="122"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="66" font-weight="800" fill="#FAFAFA" letter-spacing="-3">docket</text>

  <!-- Tagline -->
  <text x="187" y="150"
    font-family="-apple-system, BlinkMacSystemFont, sans-serif"
    font-size="11" font-weight="500" fill="#52525B" letter-spacing="6">FIELD MANAGEMENT</text>

  <!-- Concept label -->
  <text x="310" y="192"
    font-family="-apple-system, sans-serif"
    font-size="10" font-weight="400" fill="#3F3F46" letter-spacing="2" text-anchor="middle">CONCEPT 03 · THE MARK</text>
</svg>
